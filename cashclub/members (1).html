<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashClub — Área de Membros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & TOKENS ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:    #1AFF6B;
  --green-d:  #0FCC55;
  --green-xs: rgba(26,255,107,.06);
  --bg:       #04080A;
  --surf:     #0C1410;
  --card:     #0E1712;
  --border:   #182218;
  --border-h: #243824;
  --text:     #E8F0E9;
  --text-2:   #9BB09E;
  --text-3:   #5A7060;
  --ff-h:     'Bricolage Grotesque', sans-serif;
  --ff-b:     'Inter', sans-serif;
  --sidebar-w: 260px;
  --topbar-h:  56px;
}
html { height: 100%; }
body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--ff-b);
  font-size: 14px;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ───────────────────────────────────────────────── */
.topbar {
  height: var(--topbar-h);
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 50;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  flex-shrink: 0;
}
.logo-mark {
  width: 28px; height: 28px;
  background: var(--green);
  border-radius: 6px;
  display: grid; place-items: center;
}
.logo-mark svg { width:16px; height:16px; fill:#04080A; }
.logo-name { font-family:var(--ff-h); font-size:17px; font-weight:800; color:var(--text); letter-spacing:-.4px; }

.topbar-center { flex: 1; }

.notif-btn {
  position: relative;
  width: 36px; height: 36px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  display: grid; place-items: center;
  transition: border-color .2s;
  flex-shrink: 0;
}
.notif-btn:hover { border-color: var(--border-h); }
.notif-btn svg { width:18px; height:18px; stroke:var(--text-2); fill:none; stroke-width:1.6; }
.notif-dot {
  position: absolute;
  top: 7px; right: 7px;
  width: 7px; height: 7px;
  background: var(--green);
  border-radius: 50%;
  border: 1.5px solid var(--surf);
  animation: pulse 2s infinite;
}

.avatar-btn {
  display: flex;
  align-items: center;
  gap: 9px;
  cursor: pointer;
  padding: 5px 10px 5px 5px;
  border-radius: 8px;
  border: 1px solid transparent;
  transition: border-color .2s, background .2s;
  flex-shrink: 0;
}
.avatar-btn:hover { border-color:var(--border); background:var(--card); }
.avatar { width:28px; height:28px; border-radius:50%; background:var(--green-xs); border:1px solid var(--border-h); display:grid; place-items:center; font-size:12px; font-weight:600; color:var(--green); flex-shrink:0; }
.avatar-info { line-height:1.2; }
.avatar-name { font-size:13px; font-weight:600; color:var(--text); }
.avatar-plan { font-size:11px; color:var(--text-3); text-transform:uppercase; letter-spacing:.5px; }

.plan-badge {
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  flex-shrink: 0;
}
.plan-badge.starter { background:rgba(100,150,255,.15); color:#7FA3FF; border:1px solid rgba(100,150,255,.25); }
.plan-badge.pro     { background:rgba(255,170,0,.12); color:#FFAA00; border:1px solid rgba(255,170,0,.25); }
.plan-badge.vip     { background:rgba(26,255,107,.12); color:var(--green); border:1px solid rgba(26,255,107,.25); }

/* ── LAYOUT ───────────────────────────────────────────────── */
.main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── SIDEBAR ──────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surf);
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: 80px;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 4px; }

.sidebar-section {
  padding: 20px 12px 4px;
}

.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 0 8px;
  margin-bottom: 6px;
}

.channel-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 8px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .15s;
  position: relative;
  text-decoration: none;
  color: var(--text-2);
}

.channel-item:hover { background: var(--green-xs); color: var(--text); }
.channel-item.active { background: rgba(26,255,107,.1); color: var(--text); }
.channel-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 2px;
  background: var(--green);
  border-radius: 0 2px 2px 0;
}

.channel-logo {
  width: 26px; height: 26px;
  border-radius: 5px;
  object-fit: contain;
  background: var(--card);
  padding: 2px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity .4s;
}
.channel-logo.loaded { opacity: 1; }
.channel-logo-placeholder {
  width: 26px; height: 26px;
  border-radius: 5px;
  background: var(--border-h);
  flex-shrink: 0;
  animation: shimmer 1.5s infinite;
}

.channel-name {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.channel-lock {
  width: 14px; height: 14px;
  stroke: var(--text-3);
  fill: none;
  stroke-width: 1.8;
  flex-shrink: 0;
}

.channel-new {
  min-width: 18px; height: 18px;
  background: var(--green);
  color: #04080A;
  border-radius: 9px;
  font-size: 10px;
  font-weight: 700;
  display: grid; place-items: center;
  padding: 0 5px;
  flex-shrink: 0;
}

/* sidebar bottom nav */
.sidebar-bottom {
  position: fixed;
  bottom: 0;
  width: var(--sidebar-w);
  border-top: 1px solid var(--border);
  background: var(--surf);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 8px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-2);
  font-size: 13px;
  font-weight: 500;
  transition: background .15s, color .15s;
  text-decoration: none;
}
.sidebar-nav-item:hover { background:var(--green-xs); color:var(--text); }
.sidebar-nav-item svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:1.7; flex-shrink:0; }

/* ── MAIN CONTENT ─────────────────────────────────────────── */
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
}

.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 4px; }

/* ── VIEWS (page transitions) ─────────────────────────────── */
.view {
  position: absolute;
  inset: 0;
  padding: 32px;
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
  transition: opacity .3s ease, transform .3s ease;
  overflow-y: auto;
}
.view.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}

/* ── HOME / CHANNEL GRID ──────────────────────────────────── */
.view-home h2 {
  font-family: var(--ff-h);
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 4px;
}
.view-home .sub {
  color: var(--text-2);
  font-size: 14px;
  margin-bottom: 32px;
}

.category-section { margin-bottom: 36px; }

.category-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.category-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.league-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 12px;
}

.league-card {
  aspect-ratio: 1 / 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  transition: border-color .2s, transform .2s, background .2s;
  position: relative;
  overflow: hidden;
  padding: 12px;
}

.league-card:not(.locked):hover {
  border-color: var(--border-h);
  background: #111A14;
  transform: translateY(-2px);
}

.league-card.locked {
  opacity: .45;
  cursor: not-allowed;
}

.league-card img {
  width: 56px;
  height: 56px;
  object-fit: contain;
  opacity: 0;
  transition: opacity .5s;
}
.league-card img.loaded { opacity: 1; }

.league-card-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
  text-align: center;
  line-height: 1.3;
}

.league-card .lock-overlay {
  position: absolute;
  top: 8px; right: 8px;
  width: 20px; height: 20px;
  background: var(--bg);
  border-radius: 5px;
  display: grid; place-items: center;
}
.league-card .lock-overlay svg { width:11px; height:11px; stroke:var(--text-3); fill:none; stroke-width:2; }

/* ── SIGNAL FEED ──────────────────────────────────────────── */
.feed-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 24px;
}
.feed-header-logo {
  width: 40px; height: 40px;
  object-fit: contain;
  border-radius: 8px;
  background: var(--card);
  padding: 4px;
  border: 1px solid var(--border);
}
.feed-header h2 {
  font-family: var(--ff-h);
  font-size: 22px;
  font-weight: 700;
}
.feed-header .meta { color: var(--text-2); font-size: 13px; }

.feed-search-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.feed-search-box {
  flex: 1;
  min-width: 200px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  transition: border-color .2s;
}
.feed-search-box:focus-within { border-color: var(--green); }
.feed-search-box svg { width: 15px; height: 15px; stroke: var(--text-3); fill: none; stroke-width: 1.8; flex-shrink: 0; }
.feed-search-box input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--ff-b);
  font-size: 13px;
}
.feed-search-box input::placeholder { color: var(--text-3); }
.feed-analyst-select {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text-2);
  font-family: var(--ff-b);
  font-size: 13px;
  cursor: pointer;
  outline: none;
  transition: border-color .2s;
}
.feed-analyst-select:focus { border-color: var(--green); }

.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-pill {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-2);
  font-family: var(--ff-b);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
}
.filter-pill:hover, .filter-pill.active {
  background: var(--green-xs);
  border-color: rgba(26,255,107,.3);
  color: var(--green);
}

/* skeleton */
.skeleton-feed { display: flex; flex-direction: column; gap: 12px; }
.skeleton-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  animation: shimmer 1.5s infinite;
}
.skel-line {
  height: 12px;
  background: var(--border-h);
  border-radius: 6px;
  margin-bottom: 10px;
}
.skel-line.w60 { width: 60%; }
.skel-line.w80 { width: 80%; }
.skel-line.w40 { width: 40%; }

/* signal card */
.signal-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 12px;
  transition: border-color .2s;
}
.signal-card:hover { border-color: var(--border-h); }

.signal-card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.signal-league-logo {
  width: 22px; height: 22px;
  object-fit: contain;
  border-radius: 4px;
  background: var(--surf);
  padding: 2px;
}
.signal-league-name { font-size: 12px; color: var(--text-3); font-weight: 500; }
.signal-time { margin-left: auto; font-size: 11px; color: var(--text-3); }
.signal-vip-tag {
  padding: 2px 6px;
  background: rgba(26,255,107,.1);
  border: 1px solid rgba(26,255,107,.2);
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: .4px;
}

.signal-card-body { padding: 16px; }

/* Signal image */
.signal-image-wrap {
  width: 100%;
  aspect-ratio: 16 / 10;
  max-height: 320px;
  overflow: hidden;
  cursor: zoom-in;
  position: relative;
  background: var(--surf);
}
.signal-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .4s ease;
}
.signal-image-wrap:hover .signal-image { transform: scale(1.03); }
.signal-image-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,.25) 100%);
  pointer-events: none;
}

/* Lightbox */
.lightbox-overlay {
  position: fixed;
  inset: 0;
  background: rgba(4,8,10,.92);
  z-index: 999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 40px;
  cursor: zoom-out;
  opacity: 0;
  transition: opacity .25s ease;
}
.lightbox-overlay.open {
  display: flex;
  opacity: 1;
}
.lightbox-overlay img {
  max-width: 100%;
  max-height: 100%;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  transform: scale(.95);
  transition: transform .25s ease;
}
.lightbox-overlay.open img { transform: scale(1); }
.lightbox-close {
  position: fixed;
  top: 24px; right: 24px;
  width: 40px; height: 40px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: grid; place-items: center;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
}

.signal-match {
  font-family: var(--ff-h);
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 12px;
  line-height: 1.3;
}

.signal-metrics {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.metric {
  display: flex;
  flex-direction: column;
  gap: 2px;
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  min-width: 80px;
}
.metric-label { font-size: 10px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .6px; }
.metric-value { font-family: var(--ff-h); font-size: 18px; font-weight: 700; color: var(--text); }
.metric-value.green { color: var(--green); }

.signal-market {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
}

.signal-analysis {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.6;
  margin-bottom: 12px;
  display: none;
}
.signal-analysis.open { display: block; }
.toggle-analysis {
  font-size: 12px;
  color: var(--green);
  cursor: pointer;
  font-weight: 500;
  background: none; border: none;
  padding: 0;
  margin-bottom: 12px;
}

.signal-footer {
  display: flex;
  align-items: center;
  gap: 8px;
}
.analyst-avatar-sm {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--border-h);
  display: grid; place-items: center;
  font-size: 10px;
  font-weight: 600;
  color: var(--green);
  flex-shrink: 0;
}
.analyst-name-sm { font-size: 12px; color: var(--text-3); }
.signal-status {
  margin-left: auto;
  padding: 3px 9px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .3px;
}
.signal-status.pending { background:rgba(150,150,150,.1); color:var(--text-3); border:1px solid var(--border); }
.signal-status.green   { background:rgba(26,255,107,.12); color:var(--green); border:1px solid rgba(26,255,107,.25); }
.signal-status.red     { background:rgba(255,60,60,.12); color:#FF6B6B; border:1px solid rgba(255,60,60,.25); }
.signal-status.void    { background:rgba(150,120,0,.12); color:#FFBB33; border:1px solid rgba(255,180,0,.25); }

/* Entry tracking */
.signal-entry-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--surf);
}
.signal-entry-label {
  font-size: 12px;
  color: var(--text-3);
  margin-right: auto;
}
.entry-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-2);
  font-family: var(--ff-b);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.entry-btn.yes.active { background: rgba(26,255,107,.14); border-color: rgba(26,255,107,.35); color: var(--green); }
.entry-btn.no.active { background: rgba(255,60,60,.1); border-color: rgba(255,60,60,.3); color: #FF6B6B; }
.entry-btn:hover:not(.active) { border-color: var(--border-h); color: var(--text); }
.entry-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.2; vertical-align: -1px; margin-right: 4px; }

/* ── ROI VIEW ─────────────────────────────────────────────── */
.roi-stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}
.roi-stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
}
.roi-stat-label { font-size: 11px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
.roi-stat-value { font-family: var(--ff-h); font-size: 26px; font-weight: 700; }
.roi-stat-value.pos { color: var(--green); }
.roi-stat-value.neg { color: #FF6B6B; }

/* ── PROFILE VIEW ─────────────────────────────────────────── */
.profile-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  max-width: 520px;
  margin-bottom: 20px;
}
.profile-avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--green-xs);
  border: 2px solid rgba(26,255,107,.3);
  display: grid; place-items: center;
  font-family: var(--ff-h);
  font-size: 22px;
  font-weight: 700;
  color: var(--green);
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  flex-shrink: 0;
}
.profile-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.profile-avatar-edit {
  position: absolute;
  inset: 0;
  background: rgba(4,8,10,.55);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity .2s;
}
.profile-avatar:hover .profile-avatar-edit { opacity: 1; }
.profile-avatar-edit svg { width: 16px; height: 16px; stroke: var(--text); fill: none; stroke-width: 1.8; }
.profile-avatar.uploading { pointer-events: none; }
.profile-avatar.uploading .profile-avatar-edit {
  opacity: 1;
  background: rgba(4,8,10,.7);
}
.avatar-spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.25);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: avatarspin .7s linear infinite;
}
@keyframes avatarspin { to { transform: rotate(360deg); } }
.profile-name { font-family:var(--ff-h); font-size:20px; font-weight:700; margin-bottom:4px; }
.profile-email { color:var(--text-2); font-size:13px; margin-bottom:20px; }
.profile-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.profile-row:last-child { border-bottom: none; }
.profile-row-label { color: var(--text-2); }
.profile-row-value { font-weight: 600; }
.btn-danger {
  padding: 10px 18px;
  background: rgba(255,60,60,.1);
  border: 1px solid rgba(255,60,60,.25);
  border-radius: 8px;
  color: #FF6B6B;
  font-family: var(--ff-b);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s;
  margin-top: 16px;
}
.btn-danger:hover { background: rgba(255,60,60,.18); }

/* ── LOCKED CHANNEL UPSELL ────────────────────────────────── */
.upsell-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 40px 32px;
  text-align: center;
  max-width: 420px;
  margin: 0 auto;
}
.upsell-card svg.lock-big { width:48px; height:48px; stroke:var(--text-3); fill:none; stroke-width:1.4; margin-bottom:16px; }
.upsell-card h3 { font-family:var(--ff-h); font-size:20px; font-weight:700; margin-bottom:8px; }
.upsell-card p { color:var(--text-2); font-size:14px; margin-bottom:24px; line-height:1.6; }
.btn-upgrade {
  display: inline-block;
  padding: 12px 28px;
  background: var(--green);
  color: #04080A;
  font-family: var(--ff-b);
  font-size: 14px;
  font-weight: 700;
  border-radius: 8px;
  text-decoration: none;
  transition: background .2s;
  border: none;
  cursor: pointer;
}
.btn-upgrade:hover { background: var(--green-d); }

/* ── NOTIFICATION PANEL ───────────────────────────────────── */
.notif-panel {
  position: fixed;
  top: var(--topbar-h);
  right: 0;
  width: 320px;
  background: var(--surf);
  border-left: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  border-radius: 0 0 0 12px;
  max-height: 70vh;
  overflow-y: auto;
  z-index: 100;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.notif-panel.open { transform: translateX(0); }
.notif-panel-header { padding: 16px; border-bottom:1px solid var(--border); font-weight:600; font-size:14px; }
.notif-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}
.notif-item:hover { background: var(--green-xs); }
.notif-item:last-child { border-bottom: none; }
.notif-item-title { font-size:13px; font-weight:600; margin-bottom:3px; }
.notif-item-body { font-size:12px; color:var(--text-2); }
.notif-item-time { font-size:11px; color:var(--text-3); margin-top:4px; }
.notif-item.unread .notif-item-title::before {
  content: '●';
  color: var(--green);
  font-size: 8px;
  margin-right: 6px;
  vertical-align: middle;
}

/* ── TOASTS ───────────────────────────────────────────────── */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 999;
  pointer-events: none;
}
.toast {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: 280px;
  transform: translateX(120%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  pointer-events: all;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.toast.show { transform: translateX(0); }
.toast-icon { width:8px; height:8px; border-radius:50%; background:var(--green); flex-shrink:0; }
.toast-icon.red { background:#FF6B6B; }
.toast-text { font-size:13px; font-weight:500; }
.toast-sub { font-size:11px; color:var(--text-2); margin-top:1px; }

/* ── EMPTY STATE ──────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-2);
}
.empty-state svg { width:48px; height:48px; stroke:var(--text-3); fill:none; stroke-width:1.3; margin-bottom:16px; }
.empty-state h3 { font-family:var(--ff-h); font-size:18px; font-weight:600; color:var(--text); margin-bottom:6px; }
.empty-state p { font-size:14px; }

/* ── UTILITIES ────────────────────────────────────────────── */
@keyframes shimmer {
  0%,100% { opacity:.5; }
  50% { opacity:1; }
}
@keyframes pulse {
  0%,100% { transform:scale(1); opacity:1; }
  50% { transform:scale(1.3); opacity:.7; }
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}
.fade-in { animation: fadeIn .35s ease forwards; }

/* mobile sidebar toggle */
.menu-toggle { display:none; background:none; border:none; cursor:pointer; padding:4px; }
.menu-toggle svg { width:22px; height:22px; stroke:var(--text-2); fill:none; stroke-width:1.8; }

@media (max-width: 768px) {
  :root { --sidebar-w: 240px; }
  .sidebar {
    position: fixed;
    left: 0; top: var(--topbar-h); bottom: 0;
    z-index: 40;
    transform: translateX(-100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .sidebar.open { transform: translateX(0); }
  .menu-toggle { display: block; }
  .view { padding: 20px 16px; }
  .content { position: relative; }
  .avatar-info { display: none; }
}
</style>
</head>
<body>

<div class="main-layout">

<!-- NOTIFICATION PANEL -->

</div>

<!-- TOAST CONTAINER -->

<!-- LIGHTBOX -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script>
// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let STATE = {
  profile: null,
  leagues: [],
  currentLeagueId: null,
  signals: [],
  feedFilter: 'all',
  notifOpen: false,
  sidebarOpen: false,
  entries: {}, // { signal_id: true|false }
};

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
async function init() {
  // Auth guard
  const user = await getCurrentUser();
  if (!user) return window.location.href = '/login.html';

  // Load profile
  const profile = await getCurrentProfile();
  if (!profile) return window.location.href = '/login.html';
  if (profile.is_admin) return window.location.href = '/admin.html';
  STATE.profile = profile;

  // Render topbar
  renderTopbar(profile);

  // Load leagues
  const { data: leagues } = await sb.from('leagues').select('*').eq('active', true).order('sort_order');
  STATE.leagues = leagues || [];

  // Build sidebar + home grid
  renderSidebarLeagues();
  renderHomeGrid();

  // Load ROI
  loadROI();

  // Realtime: new signals
  sb.channel('signals')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'signals' }, payload => {
      handleNewSignal(payload.new);
    })
    .subscribe();

  // Load notifications
  loadNotifications();
}

// ═══════════════════════════════════════════════════
// TOPBAR
// ═══════════════════════════════════════════════════
function renderTopbar(profile) {
  const name = profile.full_name || profile.email.split('@')[0];
  document.getElementById('home-name').textContent = name.split(' ')[0];
  document.getElementById('topbar-name').textContent = name;
  document.getElementById('topbar-plan').textContent = planLabel(profile.plan);

  const topbarAvatar = document.getElementById('avatar-initials');
  if (profile.avatar_url) {
    topbarAvatar.innerHTML = `<img src="${profile.avatar_url}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  } else {
    topbarAvatar.textContent = name[0].toUpperCase();
  }

  const badge = document.getElementById('topbar-badge');
  if (profile.plan !== 'free') {
    badge.textContent = planLabel(profile.plan);
    badge.className = `plan-badge ${profile.plan}`;
    badge.style.display = '';
  }

  // Profile card
  const card = document.getElementById('profile-card');
  const avatarContent = profile.avatar_url
    ? `<img src="${profile.avatar_url}" alt="">`
    : name[0].toUpperCase();

  card.innerHTML = `
    <div class="profile-avatar" id="profile-avatar-box" onclick="document.getElementById('avatar-input').click()">
      ${avatarContent}
      <div class="profile-avatar-edit">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </div>
    </div>
    <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)">
    <div class="profile-name">${name}</div>
    <div class="profile-email">${profile.email}</div>
    <div class="profile-row"><span class="profile-row-label">Plano atual</span><span class="profile-row-value">${planLabel(profile.plan)}</span></div>
    <div class="profile-row"><span class="profile-row-label">Membro desde</span><span class="profile-row-value">${fmtDate(profile.created_at)}</span></div>
    <div class="profile-row"><span class="profile-row-label">Plano válido até</span><span class="profile-row-value">${profile.plan_expires_at ? fmtDate(profile.plan_expires_at) : '—'}</span></div>
    <div class="profile-row"><span class="profile-row-label">Email</span><span class="profile-row-value">${profile.email}</span></div>
    <button class="btn-danger" onclick="signOut()">Sair da conta</button>
    <a href="/#planos" style="display:inline-block;margin-top:10px;margin-left:12px;font-size:13px;color:var(--green);text-decoration:none;font-weight:500">Gerenciar assinatura →</a>
  `;
}

async function handleAvatarUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  if (file.size > 3 * 1024 * 1024) {
    showToast('Imagem muito grande', 'Máximo 3MB');
    return;
  }

  const box = document.getElementById('profile-avatar-box');
  box.classList.add('uploading');
  const editIcon = box.querySelector('.profile-avatar-edit');
  editIcon.innerHTML = '<div class="avatar-spinner"></div>';

  try {
    const ext = file.name.split('.').pop();
    const fileName = `avatar-${STATE.profile.id}-${Date.now()}.${ext}`;

    const { error: uploadError } = await sb.storage.from('signal-images').upload(fileName, file);
    if (uploadError) throw uploadError;

    const { data: urlData } = sb.storage.from('signal-images').getPublicUrl(fileName);
    const avatarUrl = urlData.publicUrl;

    const { error: updateError } = await sb.from('profiles').update({ avatar_url: avatarUrl }).eq('id', STATE.profile.id);
    if (updateError) throw updateError;

    STATE.profile.avatar_url = avatarUrl;
    renderTopbar(STATE.profile);
    showToast('Foto atualizada', 'Sua foto de perfil foi salva');

  } catch (err) {
    showToast('Erro ao enviar foto', err.message);
    box.classList.remove('uploading');
    editIcon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
  }
}

// ═══════════════════════════════════════════════════
// ACCESS CHECK
// ═══════════════════════════════════════════════════
function hasAccess(league) {
  const plan = STATE.profile.plan;
  if (plan === 'vip') return true;
  if (!league.plan_access.includes(plan)) return false;
  if (plan === 'starter') {
    return STATE.profile.starter_leagues?.includes(league.id);
  }
  return true;
}

// ═══════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════
const CATEGORY_LABELS = {
  football:   '⚽  Futebol',
  basketball: '🏀  Basquete',
  baseball:   '⚾  Beisebol',
  tennis:     '🎾  Tênis',
  esports:    '🎮  E-Sports',
};

function renderSidebarLeagues() {
  const categories = ['football','basketball','baseball','tennis','esports'];
  let html = '';
  categories.forEach(cat => {
    const leagues = STATE.leagues.filter(l => l.category === cat);
    if (!leagues.length) return;
    html += `<div class="sidebar-section">
      <div class="section-label">${CATEGORY_LABELS[cat]}</div>`;
    leagues.forEach(l => {
      const access = hasAccess(l);
      html += `
        <div class="channel-item${access ? '' : ' locked'}" id="nav-${l.id}" onclick="${access ? `openChannel('${l.id}')` : `showLocked('${l.id}')`}">
          ${l.logo_url
            ? `<img class="channel-logo" src="${l.logo_url}" alt="${l.name}" onload="this.classList.add('loaded')" onerror="this.outerHTML='<div class=channel-logo-placeholder></div>'">`
            : `<div class="channel-logo-placeholder"></div>`}
          <span class="channel-name">${l.name}</span>
          ${!access ? `<svg class="channel-lock" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>` : ''}
        </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('sidebar-leagues').innerHTML = html;
}

// ═══════════════════════════════════════════════════
// HOME GRID
// ═══════════════════════════════════════════════════
function renderHomeGrid() {
  const categories = ['football','basketball','baseball','tennis','esports'];
  let html = '';
  categories.forEach(cat => {
    const leagues = STATE.leagues.filter(l => l.category === cat);
    if (!leagues.length) return;
    html += `<div class="category-section">
      <div class="category-title">${CATEGORY_LABELS[cat]}</div>
      <div class="league-grid">`;
    leagues.forEach(l => {
      const access = hasAccess(l);
      html += `
        <div class="league-card${access ? '' : ' locked'}" onclick="${access ? `openChannel('${l.id}')` : `showLocked('${l.id}')`}" style="animation:fadeIn .4s ease ${leagues.indexOf(l) * .05}s both">
          ${l.logo_url
            ? `<img src="${l.logo_url}" alt="${l.name}" onload="this.classList.add('loaded')" onerror="this.style.display='none'">`
            : `<div style="width:56px;height:56px;background:var(--border-h);border-radius:8px"></div>`}
          <span class="league-card-name">${l.name}</span>
          ${!access ? `<div class="lock-overlay"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>` : ''}
        </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('league-categories').innerHTML = html;
}

// ═══════════════════════════════════════════════════
// CHANNEL / FEED
// ═══════════════════════════════════════════════════
async function openChannel(leagueId) {
  STATE.currentLeagueId = leagueId;
  STATE.feedFilter = 'all';
  const league = STATE.leagues.find(l => l.id === leagueId);
  if (!league) return;

  // Update sidebar active
  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${leagueId}`);
  if (navEl) navEl.classList.add('active');
  document.getElementById('nav-home').classList.remove('active');
  document.getElementById('nav-roi').classList.remove('active');

  // Feed header
  document.getElementById('feed-logo').src = league.logo_url || '';
  document.getElementById('feed-title').textContent = league.name;
  document.getElementById('feed-meta').textContent = 'Sinais publicados';

  // Reset filter pills and search
  document.querySelectorAll('.filter-pill').forEach((p,i) => p.classList.toggle('active', i===0));
  document.getElementById('feed-search').value = '';
  document.getElementById('feed-analyst-filter').value = '';

  showView('channel');
  renderSkeletons();

  // Fetch signals
  const now = new Date().toISOString();
  let query = sb.from('signals')
    .select('*, analysts(name, handle)')
    .eq('league_id', leagueId)
    .order('published_at', { ascending: false })
    .limit(50);

  // VIP early access: se não for VIP, só vê após vip_early_access_until
  if (STATE.profile.plan !== 'vip') {
    query = query.or(`vip_early_access_until.is.null,vip_early_access_until.lt.${now}`);
  }

  const { data: signals } = await query;
  STATE.signals = signals || [];

  // Carrega o que o membro já marcou (entrei/não entrei) para esses sinais
  if (STATE.signals.length) {
    const signalIds = STATE.signals.map(s => s.id);
    const { data: entries } = await sb.from('member_roi')
      .select('signal_id, entered')
      .eq('user_id', STATE.profile.id)
      .in('signal_id', signalIds);
    (entries || []).forEach(e => { STATE.entries[e.signal_id] = e.entered; });
  }

  populateAnalystFilter(STATE.signals);
  renderFeed(STATE.signals);

  // Close sidebar on mobile
  if (window.innerWidth < 768) toggleSidebar(false);
}

async function setEntry(signalId, entered, btn) {
  // Update UI immediately (optimistic)
  STATE.entries[signalId] = entered;
  const row = btn.closest('.signal-entry-row');
  row.querySelector('.entry-btn.yes').classList.toggle('active', entered === true);
  row.querySelector('.entry-btn.no').classList.toggle('active', entered === false);

  const { error } = await sb.rpc('set_signal_entry', { p_signal_id: signalId, p_entered: entered });
  if (error) {
    showToast('Erro ao salvar', 'Tente novamente em alguns segundos');
    console.error(error);
  }
}

function populateAnalystFilter(signals) {
  const sel = document.getElementById('feed-analyst-filter');
  const seen = new Map();
  signals.forEach(s => {
    if (s.analysts?.handle) seen.set(s.analysts.handle, s.analysts.name);
  });
  sel.innerHTML = '<option value="">Todos os analistas</option>' +
    Array.from(seen.entries()).map(([handle, name]) => `<option value="${handle}">${name}</option>`).join('');
}

function showLocked(leagueId) {
  const league = STATE.leagues.find(l => l.id === leagueId);
  const plan = STATE.profile.plan;
  const planNeeded = league?.plan_access?.[0] || 'pro';
  const labels = { starter:'Starter (R$97/mês)', pro:'Pro (R$197/mês)', vip:'VIP (R$397/mês)' };
  document.getElementById('lock-title').textContent = `${league?.name || 'Liga'} — Bloqueado`;
  document.getElementById('lock-body').textContent = `Seu plano ${planLabel(plan)} não inclui acesso a este canal. Faça upgrade para o plano ${labels[planNeeded] || planNeeded} para desbloquear.`;
  showView('locked');
}

function renderSkeletons() {
  let html = '<div class="skeleton-feed">';
  for (let i = 0; i < 3; i++) {
    html += `<div class="skeleton-card">
      <div class="skel-line w40"></div>
      <div class="skel-line w80"></div>
      <div class="skel-line w60"></div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('feed-content').innerHTML = html;
}

function filterFeed(status, btn) {
  STATE.feedFilter = status;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  applyFeedFilters();
}

function applyFeedFilters() {
  const status = STATE.feedFilter || 'all';
  const searchTerm = (document.getElementById('feed-search').value || '').trim().toLowerCase();
  const analystHandle = document.getElementById('feed-analyst-filter').value;

  let filtered = STATE.signals;

  if (status !== 'all') {
    filtered = filtered.filter(s => s.status === status);
  }
  if (searchTerm) {
    filtered = filtered.filter(s => s.match_name.toLowerCase().includes(searchTerm));
  }
  if (analystHandle) {
    filtered = filtered.filter(s => s.analysts?.handle === analystHandle);
  }

  renderFeed(filtered);
}

function renderFeed(signals) {
  const container = document.getElementById('feed-content');
  if (!signals.length) {
    const hasAnySignal = STATE.signals.length > 0;
    container.innerHTML = hasAnySignal ? `
      <div class="empty-state">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h3>Nada encontrado</h3>
        <p>Tente ajustar a busca ou os filtros aplicados.</p>
      </div>` : `
      <div class="empty-state">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <h3>Nenhum sinal ainda</h3>
        <p>Os analistas ainda não publicaram sinais nesta liga.</p>
      </div>`;
    return;
  }
  container.innerHTML = signals.map((s,i) => signalCardHTML(s, i)).join('');
}

function signalCardHTML(s, idx) {
  const league = STATE.leagues.find(l => l.id === s.league_id);
  const isVipEarly = s.vip_early_access_until && new Date(s.vip_early_access_until) > new Date();
  const statusMap = { pending:'Pendente', green:'✅ Green', red:'❌ Red', void:'⚪ Void' };
  const analystName = s.analysts?.name || 'Analista';
  const initials = analystName.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const entryState = STATE.entries[s.id]; // true, false, or undefined

  return `
  <div class="signal-card fade-in" style="animation-delay:${idx * .06}s">
    <div class="signal-card-top">
      ${league?.logo_url
        ? `<img class="signal-league-logo" src="${league.logo_url}" alt="${league.name}" onerror="this.style.display='none'">`
        : ''}
      <span class="signal-league-name">${league?.name || s.league_id}</span>
      ${isVipEarly ? '<span class="signal-vip-tag">VIP EARLY</span>' : ''}
      <span class="signal-time">${fmtDatetime(s.published_at)}</span>
    </div>
    ${s.image_url ? `
    <div class="signal-image-wrap" onclick="openLightbox('${s.image_url}')">
      <img class="signal-image" src="${s.image_url}" alt="Imagem do sinal" loading="lazy">
    </div>` : ''}
    <div class="signal-card-body">
      <div class="signal-match">${s.match_name}</div>
      <div class="signal-metrics">
        <div class="metric">
          <span class="metric-label">Odd</span>
          <span class="metric-value green">${Number(s.odd).toFixed(2)}</span>
        </div>
        <div class="metric">
          <span class="metric-label">Stake</span>
          <span class="metric-value">${s.stake}u</span>
        </div>
        ${s.status !== 'pending' ? `
        <div class="metric">
          <span class="metric-label">Lucro</span>
          <span class="metric-value ${Number(s.profit_units) >= 0 ? 'green' : ''}">${Number(s.profit_units) >= 0 ? '+' : ''}${Number(s.profit_units).toFixed(2)}u</span>
        </div>` : ''}
      </div>
      <div class="signal-market">${s.market}</div>
      ${s.analysis ? `
        <button class="toggle-analysis" onclick="toggleAnalysis(this)">Ver análise ↓</button>
        <div class="signal-analysis">${s.analysis}</div>
      ` : ''}
      <div class="signal-footer">
        <div class="analyst-avatar-sm">${initials}</div>
        <span class="analyst-name-sm">@${s.analysts?.handle || 'analista'}</span>
        <span class="signal-status ${s.status}">${statusMap[s.status] || s.status}</span>
      </div>
    </div>
    <div class="signal-entry-row">
      <span class="signal-entry-label">Você entrou nessa?</span>
      <button class="entry-btn yes ${entryState === true ? 'active' : ''}" onclick="setEntry('${s.id}', true, this)">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Entrei
      </button>
      <button class="entry-btn no ${entryState === false ? 'active' : ''}" onclick="setEntry('${s.id}', false, this)">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Não entrei
      </button>
    </div>
  </div>`;
}

function toggleAnalysis(btn) {
  const analysis = btn.nextElementSibling;
  const isOpen = analysis.classList.toggle('open');
  btn.textContent = isOpen ? 'Fechar análise ↑' : 'Ver análise ↓';
}

// ═══════════════════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════════════════
function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

// ═══════════════════════════════════════════════════
// ROI
// ═══════════════════════════════════════════════════
async function loadROI() {
  // Busca apenas os sinais que o membro marcou como "entrei", com resultado já definido
  const { data: myEntries } = await sb.from('member_roi')
    .select('*, signals(*, leagues(name, logo_url))')
    .eq('user_id', STATE.profile.id)
    .eq('entered', true)
    .order('created_at', { ascending: false });

  const resolved = (myEntries || []).filter(e => e.signals && ['green','red','void'].includes(e.signals.status));

  const total = resolved.length;
  const greens = resolved.filter(e => e.signals.status === 'green').length;
  const totalUnits = resolved.reduce((acc, e) => acc + Number(e.profit_units || 0), 0);
  const decided = resolved.filter(e => e.signals.status !== 'void').length;
  const winRate = decided ? ((greens / decided) * 100).toFixed(1) : 0;

  document.getElementById('roi-stats').innerHTML = `
    <div class="roi-stat">
      <div class="roi-stat-label">Minhas Unidades</div>
      <div class="roi-stat-value ${totalUnits >= 0 ? 'pos' : 'neg'}">${totalUnits >= 0 ? '+' : ''}${totalUnits.toFixed(2)}u</div>
    </div>
    <div class="roi-stat">
      <div class="roi-stat-label">Taxa de Acerto</div>
      <div class="roi-stat-value pos">${winRate}%</div>
    </div>
    <div class="roi-stat">
      <div class="roi-stat-label">Entradas</div>
      <div class="roi-stat-value">${total}</div>
    </div>
    <div class="roi-stat">
      <div class="roi-stat-label">Greens</div>
      <div class="roi-stat-value pos">${greens}</div>
    </div>`;

  const histHtml = resolved.slice(0, 30).map(e => {
    const s = e.signals;
    return `
    <div class="signal-card" style="margin-bottom:10px">
      <div class="signal-card-body" style="padding:14px 16px">
        <div style="display:flex;align-items:center;gap:10px">
          ${s.leagues?.logo_url ? `<img style="width:18px;height:18px;object-fit:contain" src="${s.leagues.logo_url}" alt="">` : ''}
          <span style="font-size:14px;font-weight:600;flex:1">${s.match_name}</span>
          <span class="signal-status ${s.status}">${{green:'✅ Green',red:'❌ Red',void:'⚪ Void'}[s.status]}</span>
        </div>
        <div style="margin-top:8px;font-size:12px;color:var(--text-2)">${s.market} · Odd ${Number(s.odd).toFixed(2)} · ${s.stake}u · ${Number(e.profit_units) >= 0 ? '+' : ''}${Number(e.profit_units).toFixed(2)}u</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('roi-history').innerHTML = histHtml || `
    <div class="empty-state">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <h3>Nenhuma entrada registrada</h3>
      <p>Marque "Entrei" nos sinais que você apostou para acompanhar seu ROI real aqui.</p>
    </div>`;
}

// ═══════════════════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════════════════
async function loadNotifications() {
  const { data } = await sb.from('notifications')
    .select('*')
    .or(`user_id.eq.${STATE.profile.id},user_id.is.null`)
    .order('created_at', { ascending: false })
    .limit(20);

  const notifs = data || [];
  const unread = notifs.filter(n => !n.read);
  if (unread.length) {
    document.getElementById('notif-dot').style.display = '';
  }

  const list = document.getElementById('notif-list');
  list.innerHTML = notifs.length
    ? notifs.map(n => `
        <div class="notif-item${n.read ? '' : ' unread'}" onclick="markRead('${n.id}', this)">
          <div class="notif-item-title">${n.title}</div>
          ${n.body ? `<div class="notif-item-body">${n.body}</div>` : ''}
          <div class="notif-item-time">${fmtDatetime(n.created_at)}</div>
        </div>`).join('')
    : '<div style="padding:24px;text-align:center;color:var(--text-3);font-size:13px">Nenhuma notificação</div>';
}

async function markRead(id, el) {
  await sb.from('notifications').update({ read: true }).eq('id', id);
  el.classList.remove('unread');
}

function toggleNotif() {
  STATE.notifOpen = !STATE.notifOpen;
  document.getElementById('notif-panel').classList.toggle('open', STATE.notifOpen);
}

// ═══════════════════════════════════════════════════
// REALTIME — new signal toast
// ═══════════════════════════════════════════════════
function handleNewSignal(signal) {
  const league = STATE.leagues.find(l => l.id === signal.league_id);
  if (!league || !hasAccess(league)) return;
  showToast('Novo sinal publicado', `${league.name} · ${signal.match_name}`);

  // Refresh feed if watching this league
  if (STATE.currentLeagueId === signal.league_id) {
    STATE.signals.unshift(signal);
    renderFeed(STATE.signals);
  }
}

function showToast(title, sub) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<div class="toast-icon"></div><div><div class="toast-text">${title}</div><div class="toast-sub">${sub}</div></div>`;
  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 400);
  }, 4000);
}

// ═══════════════════════════════════════════════════
// VIEW TRANSITIONS
// ═══════════════════════════════════════════════════
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');

  // Sidebar nav
  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
  const navMap = { home:'nav-home', roi:'nav-roi' };
  if (navMap[name]) {
    const el = document.getElementById(navMap[name]);
    if (el) el.classList.add('active');
  }

  if (name === 'roi') loadROI();

  // Close notif panel
  STATE.notifOpen = false;
  document.getElementById('notif-panel').classList.remove('open');
}

function toggleSidebar(force) {
  const sidebar = document.getElementById('sidebar');
  STATE.sidebarOpen = force !== undefined ? force : !STATE.sidebarOpen;
  sidebar.classList.toggle('open', STATE.sidebarOpen);
}

// Close panels on outside click
document.addEventListener('click', e => {
  if (STATE.notifOpen && !e.target.closest('#notif-panel') && !e.target.closest('#notif-btn')) {
    STATE.notifOpen = false;
    document.getElementById('notif-panel').classList.remove('open');
  }
});

// ═══════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════
init();
</script>

</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — CashClub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:   #1AFF6B;
  --green-d: #0FCC55;
  --bg:      #04080A;
  --surface: #0C1410;
  --card:    #111A14;
  --border:  #1C2A1E;
  --text:    #E8F0E9;
  --muted:   #6B8270;
  --ff-head: 'Bricolage Grotesque', sans-serif;
  --ff-body: 'Inter', sans-serif;
  --r:       12px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--ff-body);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
}

/* grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(26,255,107,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,255,107,.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

.wrap {
  width: 100%;
  max-width: 420px;
  padding: 24px 20px;
  position: relative;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 40px;
  justify-content: center;
}

.logo-mark {
  width: 36px;
  height: 36px;
  background: var(--green);
  border-radius: 8px;
  display: grid;
  place-items: center;
}

.logo-mark svg { width: 20px; height: 20px; fill: #04080A; }

.logo-name {
  font-family: var(--ff-head);
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -.5px;
  color: var(--text);
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 32px;
}

.card h1 {
  font-family: var(--ff-head);
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}

.card .subtitle {
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 28px;
}

.tab-row {
  display: flex;
  background: var(--bg);
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 24px;
  gap: 4px;
}

.tab-btn {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  font-family: var(--ff-body);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
}

.tab-btn.active {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}

.field { margin-bottom: 16px; }

.field label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 7px;
  letter-spacing: .3px;
}

.field input {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--ff-body);
  font-size: 15px;
  outline: none;
  transition: border-color .2s;
}

.field input::placeholder { color: var(--muted); }
.field input:focus { border-color: var(--green); }

.btn-primary {
  width: 100%;
  padding: 13px;
  background: var(--green);
  border: none;
  border-radius: 8px;
  color: #04080A;
  font-family: var(--ff-body);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background .2s, transform .1s;
  position: relative;
  overflow: hidden;
}

.btn-primary:hover { background: var(--green-d); }
.btn-primary:active { transform: scale(.98); }

.btn-primary.loading { pointer-events: none; }

.btn-primary .spinner {
  display: none;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(4,8,10,.3);
  border-top-color: #04080A;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
}

.btn-primary.loading .btn-text { opacity: 0; }
.btn-primary.loading .spinner { display: block; }

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  color: var(--muted);
  font-size: 13px;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.alert {
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  margin-top: 14px;
  display: none;
}

.alert.error { background: rgba(255,50,50,.1); border: 1px solid rgba(255,50,50,.3); color: #FF6B6B; }
.alert.success { background: rgba(26,255,107,.1); border: 1px solid rgba(26,255,107,.3); color: var(--green); }
.alert.show { display: block; }

.forgot {
  text-align: right;
  margin-top: -8px;
  margin-bottom: 16px;
}

.forgot a {
  font-size: 13px;
  color: var(--green);
  text-decoration: none;
}

.forgot a:hover { text-decoration: underline; }

.bottom-text {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--muted);
}

.bottom-text a {
  color: var(--green);
  text-decoration: none;
  font-weight: 500;
}

#panel-register { display: none; }

@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card { animation: fadeUp .4s ease; }
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="logo-name">CashClub</span>
  </div>

  <div class="card">
    <div class="tab-row">
      <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Entrar</button>
      <button class="tab-btn" id="tab-reg" onclick="showTab('register')">Criar conta</button>
    </div>

    <!-- LOGIN -->
    <div id="panel-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="forgot"><a href="#" onclick="handleForgot(event)">Esqueci a senha</a></div>
      <button class="btn-primary" id="btn-login" onclick="handleLogin()">
        <span class="btn-text">Entrar</span>
        <div class="spinner"></div>
      </button>
      <div class="alert" id="login-alert"></div>
    </div>

    <!-- REGISTER -->
    <div id="panel-register">
      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="reg-name" placeholder="Seu nome" autocomplete="name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="btn-reg" onclick="handleRegister()">
        <span class="btn-text">Criar conta</span>
        <div class="spinner"></div>
      </button>
      <div class="alert" id="reg-alert"></div>
    </div>
  </div>

  <p class="bottom-text">
    Ainda não é membro? <a href="/#planos">Ver planos</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script>
// Redirecionar se já logado
(async () => {
  const user = await getCurrentUser();
  if (user) {
    const profile = await getCurrentProfile();
    window.location.href = profile?.is_admin ? '/admin.html' : '/members.html';
  }
})();

function showTab(tab) {
  document.getElementById('panel-login').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('panel-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-reg').classList.toggle('active', tab === 'register');
}

function setLoading(btnId, state) {
  document.getElementById(btnId).classList.toggle('loading', state);
}

function showAlert(id, msg, type = 'error') {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `alert ${type} show`;
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if (!email || !pass) return showAlert('login-alert', 'Preencha todos os campos.');
  setLoading('btn-login', true);

  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    setLoading('btn-login', false);
    return showAlert('login-alert', 'Email ou senha incorretos.');
  }

  const profile = await getCurrentProfile();
  window.location.href = profile?.is_admin ? '/admin.html' : '/members.html';
}

async function handleRegister() {
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-pass').value;

  if (!name || !email || !pass) return showAlert('reg-alert', 'Preencha todos os campos.');
  if (pass.length < 8) return showAlert('reg-alert', 'Senha deve ter pelo menos 8 caracteres.');

  setLoading('btn-reg', true);
  const { error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { full_name: name } }
  });

  setLoading('btn-reg', false);
  if (error) return showAlert('reg-alert', error.message);
  showAlert('reg-alert', 'Conta criada! Verifique seu email para ativar.', 'success');
}

async function handleForgot(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  if (!email) return showAlert('login-alert', 'Digite seu email primeiro.');
  await sb.auth.resetPasswordForEmail(email, { redirectTo: `${location.origin}/reset-password.html` });
  showAlert('login-alert', 'Link de recuperação enviado para ' + email, 'success');
}

// Enter para submeter
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const panel = document.getElementById('panel-register').style.display === 'none' ? 'login' : 'register';
  panel === 'login' ? handleLogin() : handleRegister();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagar com Pix — CashClub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1AFF6B; --green-d: #0FCC55; --bg: #04080A; --surface: #0C1410;
  --card: #111A14; --border: #1C2A1E; --text: #E8F0E9; --muted: #6B8270;
  --ff-head: 'Bricolage Grotesque', sans-serif; --ff-body: 'Inter', sans-serif;
}
html, body {
  min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--ff-body);
  display: flex; align-items: center; justify-content: center; min-height: 100dvh;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(26,255,107,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,255,107,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.wrap { width: 100%; max-width: 460px; padding: 24px 20px; position: relative; z-index: 1; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; justify-content: center; }
.logo-mark { width: 32px; height: 32px; background: var(--green); border-radius: 8px; display: grid; place-items: center; }
.logo-mark svg { width: 18px; height: 18px; fill: #04080A; }
.logo-name { font-family: var(--ff-head); font-size: 20px; font-weight: 800; color: var(--text); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; text-align: center; animation: fadeUp .4s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.card h1 { font-family: var(--ff-head); font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.card .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

.amount { font-family: var(--ff-head); font-size: 36px; font-weight: 800; color: var(--green); margin-bottom: 4px; }
.amount-note { font-size: 12px; color: var(--muted); margin-bottom: 20px; }

.qr-box { background: #fff; border-radius: 14px; padding: 18px; margin-bottom: 20px; display: inline-block; position: relative; }
.qr-box img { width: 220px; height: 220px; display: block; border-radius: 4px; }

.expiry-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted); margin-bottom: 16px;
}
.expiry-badge svg { width: 14px; height: 14px; stroke: var(--muted); fill: none; stroke-width: 2; }

.copy-row { display: flex; gap: 8px; margin-bottom: 20px; }
.copy-input {
  flex: 1; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted); font-family: monospace; font-size: 12px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.btn-copy {
  padding: 12px 18px; background: var(--green); border: none; border-radius: 8px;
  color: #04080A; font-family: var(--ff-body); font-size: 13px; font-weight: 700;
  cursor: pointer; transition: background .2s; flex-shrink: 0;
}
.btn-copy:hover { background: var(--green-d); }

.howto {
  text-align: left; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; margin-bottom: 20px;
}
.howto-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .4px; }
.howto-step { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; font-size: 13px; color: var(--muted); }
.howto-step:last-child { margin-bottom: 0; }
.howto-num {
  width: 18px; height: 18px; border-radius: 50%; background: rgba(26,255,107,.12);
  color: var(--green); font-size: 11px; font-weight: 700; display: grid; place-items: center;
  flex-shrink: 0; margin-top: 1px;
}

.status-row {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px; background: rgba(26,255,107,.06);
  border: 1px solid rgba(26,255,107,.18); border-radius: 8px; font-size: 13px;
}
.status-row.approved { background: rgba(26,255,107,.12); border-color: rgba(26,255,107,.3); color: var(--green); font-weight: 600; }
.status-row.expired { background: rgba(255,170,50,.08); border-color: rgba(255,170,50,.25); color: #FFAA33; }
.spinner {
  width: 14px; height: 14px; border: 2px solid rgba(26,255,107,.25);
  border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  background: rgba(255,60,60,.08); border: 1px solid rgba(255,60,60,.25);
  border-radius: 8px; padding: 16px; color: #FF6B6B; font-size: 14px;
}

.loading-box { padding: 40px 0; color: var(--muted); font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
.loading-spinner {
  width: 28px; height: 28px; border: 3px solid rgba(26,255,107,.2);
  border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite;
}

.back-link { display: inline-block; margin-top: 18px; font-size: 13px; color: var(--muted); text-decoration: none; }
.back-link:hover { color: var(--green); }

.btn-regenerate {
  margin-top: 12px; padding: 10px 18px; background: transparent; border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: var(--ff-body); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.btn-regenerate:hover { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <span class="logo-name">CashClub</span>
  </div>

  <div class="card" id="card">
    <div class="loading-box" id="loading">
      <div class="loading-spinner"></div>
      <span>Gerando o Pix…</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script>
const FUNCTIONS_BASE = 'https://ghqrpuzvanrfbhqynacl.supabase.co/functions/v1';
let pollInterval = null;
let expiryInterval = null;
const PIX_EXPIRY_MINUTES = 30;

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

async function init() {
  const plan = getParam('plan');
  const period = getParam('period') || 'monthly';

  if (!plan) {
    showError('Plano não especificado.');
    return;
  }

  const user = await getCurrentUser();
  if (!user) {
    window.location.href = `/login.html?plan=${plan}&period=${period}&method=pix`;
    return;
  }

  const profile = await getCurrentProfile();

  try {
    const res = await fetch(`${FUNCTIONS_BASE}/pix-checkout`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        plan, period,
        email: profile.email,
        name: profile.full_name || profile.email.split('@')[0],
      }),
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      showError(data.error || 'Não foi possível gerar o Pix. Tente novamente.');
      return;
    }

    renderQR(data, plan, period);
    startPolling(data.payment_id);
    startExpiryCountdown();

  } catch (err) {
    showError('Erro de conexão. Tente novamente em alguns segundos.');
  }
}

function renderQR(data, plan, period) {
  const planLabels = { starter: 'Starter', pro: 'Pro', vip: 'VIP' };
  const periodLabels = { monthly: 'mensal', quarterly: 'trimestral' };

  document.getElementById('card').innerHTML = `
    <h1>Pagar com Pix</h1>
    <p class="sub">Plano ${planLabels[plan] || plan} — ${periodLabels[period] || ''}</p>
    <div class="amount">R$ ${data.amount.toFixed(2).replace('.', ',')}</div>
    <div class="amount-note">Valor único — sem cobrança automática</div>
    <div class="qr-box"><img src="data:image/png;base64,${data.qr_code_base64}" alt="QR Code Pix"></div>
    <div class="expiry-badge" id="expiry-badge">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="expiry-text">Expira em ${PIX_EXPIRY_MINUTES} minutos</span>
    </div>
    <div class="copy-row">
      <div class="copy-input" id="pix-code">${data.qr_code}</div>
      <button class="btn-copy" onclick="copyPixCode()">Copiar</button>
    </div>
    <div class="howto">
      <div class="howto-title">Como pagar</div>
      <div class="howto-step"><span class="howto-num">1</span>Abra o app do seu banco</div>
      <div class="howto-step"><span class="howto-num">2</span>Escolha pagar via Pix com QR Code ou Copia e Cola</div>
      <div class="howto-step"><span class="howto-num">3</span>Confirme o pagamento — seu acesso libera automaticamente</div>
    </div>
    <div class="status-row" id="status-row">
      <div class="spinner"></div>
      <span>Aguardando pagamento…</span>
    </div>
    <a href="/members.html" class="back-link">Pagar depois — ir para a plataforma →</a>
  `;
  window._pixCode = data.qr_code;
}

function startExpiryCountdown() {
  const deadline = Date.now() + PIX_EXPIRY_MINUTES * 60000;
  expiryInterval = setInterval(() => {
    const remainingMs = deadline - Date.now();
    const badge = document.getElementById('expiry-text');
    if (!badge) { clearInterval(expiryInterval); return; }

    if (remainingMs <= 0) {
      clearInterval(expiryInterval);
      badge.textContent = 'QR Code expirado';
      document.getElementById('expiry-badge').style.color = '#FFAA33';
      const statusRow = document.getElementById('status-row');
      if (statusRow && !statusRow.classList.contains('approved')) {
        statusRow.className = 'status-row expired';
        statusRow.innerHTML = `Expirou sem pagamento. <button class="btn-regenerate" onclick="location.reload()">Gerar novo Pix</button>`;
      }
      return;
    }

    const mins = Math.floor(remainingMs / 60000);
    const secs = Math.floor((remainingMs % 60000) / 1000);
    badge.textContent = `Expira em ${mins}min ${secs.toString().padStart(2,'0')}s`;
  }, 1000);
}

function copyPixCode() {
  navigator.clipboard.writeText(window._pixCode);
  const btn = document.querySelector('.btn-copy');
  const original = btn.textContent;
  btn.textContent = 'Copiado!';
  setTimeout(() => btn.textContent = original, 2000);
}

function startPolling(paymentId) {
  pollInterval = setInterval(async () => {
    try {
      const res = await fetch(`${FUNCTIONS_BASE}/pix-status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ payment_id: paymentId }),
      });
      const data = await res.json();

      if (data.status === 'approved') {
        clearInterval(pollInterval);
        clearInterval(expiryInterval);
        const statusRow = document.getElementById('status-row');
        statusRow.className = 'status-row approved';
        statusRow.innerHTML = '✅ Pagamento confirmado! Redirecionando…';
        setTimeout(() => window.location.href = '/members.html', 2000);
      } else if (data.status === 'rejected' || data.status === 'cancelled') {
        clearInterval(pollInterval);
        clearInterval(expiryInterval);
        showError('O pagamento não foi aprovado. Tente gerar um novo Pix.');
      }
    } catch (err) {
      console.error('Erro ao verificar status:', err);
    }
  }, 4000);
}

function showError(msg) {
  document.getElementById('card').innerHTML = `
    <h1>Algo deu errado</h1>
    <div class="error-box">${msg}</div>
    <p class="sub" style="margin-top:16px"><a href="/#planos" style="color:var(--green)">← Voltar para os planos</a></p>
  `;
}

init();
</script>
</body>
</html>
